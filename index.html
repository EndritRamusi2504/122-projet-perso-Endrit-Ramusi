<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barça Squad — Gestion des joueurs</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

<header class="site-header">
    <div class="header-inner">
        <div class="logo">
            <span class="logo-badge">FCB</span>
            <div class="logo-text">
                <span class="logo-title">Barça Squad</span>
                <span class="logo-sub">Gestionnaire de joueurs</span>
            </div>
        </div>
        <div class="header-stats">
            <span id="compteur-joueurs">0 joueurs</span>
        </div>
    </div>
</header>

<nav class="controls-bar" aria-label="Contrôles de la liste">
    <div class="controls-inner">

        <div class="control-group">
            <label for="recherche" class="sr-only">Rechercher un joueur</label>
            <div class="input-icon-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
                </svg>
                <input type="search" id="recherche" placeholder="Rechercher un joueur…" autocomplete="off" />
            </div>
        </div>

        <div class="control-group">
            <label for="filtre-poste" class="sr-only">Filtrer par poste</label>
            <select id="filtre-poste">
                <option value="">Tous les postes</option>
                <option value="Gardien">Gardien</option>
                <option value="Défenseur">Défenseur</option>
                <option value="Milieu">Milieu</option>
                <option value="Attaquant">Attaquant</option>
            </select>
        </div>

        <div class="control-group">
            <label for="tri" class="sr-only">Trier par</label>
            <select id="tri">
                <option value="nom">Trier par nom</option>
                <option value="numero">Trier par numéro</option>
                <option value="age">Trier par âge</option>
                <option value="note">Trier par note</option>
            </select>
        </div>

        <button id="btn-ouvrir-formulaire" class="btn btn-primary" aria-expanded="false" aria-controls="section-formulaire">
            + Ajouter un joueur
        </button>

    </div>
</nav>

<main class="main-content">

    <section id="section-formulaire" class="form-section" aria-hidden="true">
        <div class="form-card">
            <h2 id="form-titre">Ajouter un joueur</h2>

            <input type="hidden" id="joueur-id" />

            <div class="form-grid">

                <div class="form-group">
                    <label for="f-nom">Nom complet *</label>
                    <input type="text" id="f-nom" placeholder="ex : Robert Lewandowski" required />
                </div>

                <div class="form-group">
                    <label for="f-numero">Numéro *</label>
                    <input type="number" id="f-numero" min="1" max="99" placeholder="ex : 9" required />
                </div>

                <div class="form-group">
                    <label for="f-poste">Poste *</label>
                    <select id="f-poste" required>
                        <option value="">Choisir…</option>
                        <option value="Gardien">Gardien</option>
                        <option value="Défenseur">Défenseur</option>
                        <option value="Milieu">Milieu</option>
                        <option value="Attaquant">Attaquant</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="f-nationalite">Nationalité *</label>
                    <input type="text" id="f-nationalite" placeholder="ex : Espagne" required />
                </div>

                <div class="form-group">
                    <label for="f-age">Âge *</label>
                    <input type="number" id="f-age" min="15" max="45" placeholder="ex : 25" required />
                </div>

                <div class="form-group">
                    <label for="f-note">Note (1–99) *</label>
                    <input type="number" id="f-note" min="1" max="99" placeholder="ex : 88" required />
                </div>

                <div class="form-group form-group--full">
                    <label for="f-image">URL de l'image (optionnel)</label>
                    <input type="url" id="f-image" placeholder="https://…" />
                </div>

            </div>

            <div class="form-actions">
                <button type="button" id="btn-soumettre" class="btn btn-primary">Ajouter</button>
                <button type="button" id="btn-annuler" class="btn btn-ghost">Annuler</button>
            </div>
        </div>
    </section>

    <p id="message-vide" class="empty-message" hidden>
        Aucun joueur ne correspond à votre recherche.
    </p>

    <div id="grille-joueurs" class="players-grid" role="list" aria-label="Liste des joueurs"></div>

</main>

<footer class="site-footer">
    <p>Barça Squad &mdash; Projet JavaScript &copy; 2025</p>
</footer>

<div id="toast" class="toast" role="alert" aria-live="polite" aria-atomic="true"></div>

<script src="js/script.js"></script>
</body>
</html>
